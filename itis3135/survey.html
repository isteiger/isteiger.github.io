<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ian K. Steiger's Ingenious Squirrel ~ ITIS 3135 | Survey</title>
    <link rel="stylesheet" href="styles/default.css">
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
</head>

<body>
    <div data-include="components/header.html"></div>
    <main>
<h1 id="title">Quick Feedback Survey</h1>
<p id="description">Help us improve by answering a few short questions below.</p>

<form id="survey-form">
  <label id="name-label" for="name">Name</label>
  <input
    id="name"
    type="text"
    name="name"
    placeholder="Enter your full name"
    required
  />

  <label id="email-label" for="email">Email</label>
  <input
    id="email"
    type="email"
    name="email"
    placeholder="Enter a valid email address"
    required
  />

  <label id="number-label" for="number">Age</label>
  <input
    id="number"
    type="number"
    name="age"
    min="13"
    max="120"
    placeholder="Enter your age (13-120)"
  />

  <label for="dropdown">How did you hear about us?</label>
  <select id="dropdown" name="referral">
    <option value="">Select one</option>
    <option value="friend">Friend / Family</option>
    <option value="social">Social Media</option>
    <option value="search">Search Engine</option>
  </select>

  <p>How satisfied are you?</p>
  <label>
    <input type="radio" name="satisfaction" value="happy" />
    Satisfied
  </label>
  <label>
    <input type="radio" name="satisfaction" value="neutral" />
    Neutral
  </label>
  <label>
    <input type="radio" name="satisfaction" value="sad" />
    Not satisfied
  </label>

  <p>What features do you use? (Select all that apply)</p>
  <label>
    <input type="checkbox" name="features" value="notifications" />
    Notifications
  </label>
  <label>
    <input type="checkbox" name="features" value="search" />
    Search
  </label>
  <label>
    <input type="checkbox" name="features" value="favorites" />
    Favorites
  </label>

  <label for="comments">Additional comments</label>
  <textarea
    id="comments"
    name="comments"
    rows="5"
    placeholder="Anything else you want to tell us?"
  ></textarea>

  <button id="submit" type="submit">Submit</button>
</form>
    </main>
    <div data-include="components/footer.html"></div>
    <script src="scripts/include.min.js"></script>
</body>

</html>
